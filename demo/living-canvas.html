<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Living Canvas</title>
  <style>
    :root {
      --bg-0: #04040a;
      --bg-1: #0c1124;
      --bg-2: #181f44;
      --bg-3: #2b1e63;
      --text: #ecebff;
      --muted: #8f95bb;
      --active: #9a8dff;
      --inactive: #4e567f;
      --ring: rgba(154, 141, 255, 0.4);
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      font-family: "DM Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(58% 52% at 50% 34%, var(--bg-3) 0%, var(--bg-2) 40%, var(--bg-1) 68%, var(--bg-0) 100%),
        linear-gradient(160deg, #0b1020 0%, #06070f 100%);
      overflow: hidden;
    }

    .canvas {
      position: relative;
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
    }

    .avatar-wrap {
      position: relative;
      width: min(46vw, 360px);
      aspect-ratio: 1;
      border-radius: 999px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: radial-gradient(circle at 36% 28%, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.01) 56%);
      backdrop-filter: blur(6px);
      box-shadow:
        0 0 44px 6px rgba(154, 141, 255, 0.3),
        0 0 140px 24px rgba(118, 91, 255, 0.16);
      /* overflow: hidden removed — live2d avatar stands above the circle */
    }
    /* When live2d is active: circle completely invisible, just a layout anchor */
    .avatar-wrap.has-live2d {
      overflow: visible;
      background: transparent !important;
      border-color: transparent !important;
      backdrop-filter: none !important;
      box-shadow: none !important;
    }
    .avatar-wrap.has-live2d::before,
    .avatar-wrap.has-live2d::after {
      display: none !important;
    }

    .avatar-wrap::before {
      content: "";
      position: absolute;
      inset: -8%;
      border-radius: 999px;
      border: 1px solid var(--ring);
      filter: blur(2px);
    }

    .avatar-wrap::after {
      content: "";
      position: absolute;
      inset: -22%;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(154, 141, 255, 0.2), rgba(154, 141, 255, 0) 70%);
      filter: blur(14px);
      z-index: -1;
    }

    .avatar {
      width: 100%;
      height: 100%;
      border-radius: 999px;
      object-fit: cover;
      display: block;
      background: #131327;
    }

    .avatar-media {
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    #live2dCanvas {
      z-index: 3;
      border-radius: 0;
      background: transparent !important;
      width: 100%;
      height: 100%;
    }

    .meta {
      margin-top: 24px;
      text-align: center;
      display: none;
    }

    .name {
      margin: 0;
      font-size: clamp(26px, 3vw, 38px);
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .role {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .sense-rail {
      position: absolute;
      right: 22px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 10px 8px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      background: rgba(8, 10, 24, 0.5);
      backdrop-filter: blur(8px);
    }

    .sense {
      width: 40px;
      height: 40px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.03);
      display: grid;
      place-items: center;
      color: var(--inactive);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      transition: all 180ms ease;
    }

    .sense.active {
      color: var(--active);
      border-color: rgba(154, 141, 255, 0.68);
      box-shadow: 0 0 16px rgba(154, 141, 255, 0.32);
      background: rgba(154, 141, 255, 0.1);
    }

    .status-badge {
      position: absolute;
      left: 20px;
      top: 20px;
      z-index: 9;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.03em;
      background: rgba(8, 10, 22, 0.66);
      border: 1px solid rgba(255, 255, 255, 0.22);
      color: #d8dcff;
      backdrop-filter: blur(8px);
    }

    .status-badge.locked {
      color: #ffffff;
      border-color: rgba(154, 141, 255, 0.8);
      box-shadow: 0 0 14px rgba(154, 141, 255, 0.38);
      background: rgba(44, 33, 108, 0.62);
    }

    .render-badge {
      top: 56px;
      color: #cbd4ff;
      font-weight: 600;
      font-size: 11px;
      opacity: 0.95;
      display: none;
    }

    .render-badge.fallback {
      color: #ffd7d7;
      border-color: rgba(255, 138, 138, 0.8);
      background: rgba(95, 30, 40, 0.62);
    }

    @media (max-width: 900px) {
      .avatar-wrap { width: min(72vw, 320px); }
    }
  </style>
</head>

  <!-- livekit-client: only needed for realtime streaming sessions; disabled for local demo -->
  <!-- <script src="/demo/vendor-dist/livekit-client.umd.min.js"></script> -->
  <script src="/packages/avatar-runtime/web/renderers/live2d-pixi-adapter.js"></script>
  <script src="/packages/avatar-runtime/web/renderer-registry.js"></script>
  <script src="/packages/avatar-runtime/web/renderers/vector-renderer.js"></script>
  <script src="/packages/avatar-runtime/web/index.js"></script>
  <script>
    var __stateUrl = null;
    var __pollTimer = null;
    var __lastStateHash = '';
    var __livekitConnected = false;
    var __queryIntentOverride = null;
    var __viewerRenderState = null;
    var __viewerWaitTimer = null;
    var __viewerWaitToken = 0;
    var __viewerFallbackByTimeout = false;
    var __viewerLoaded = false;
    var __viewerError = false;
    var __viewerLastHeartbeatAt = 0;

    // ── Direct Live2D renderer (no iframe) ──
    var __live2dModel = null;
    var __live2dModelUrl = '';
    var __live2dLoading = false;
    var __live2dReady = false;
    var __live2dRendererKind = '';
    var __pixiAdapter = null;

    function resolveLive2DRuntime(url) {
      if (!url) return '';
      return /\.model\.json($|\?)/i.test(url) ? 'c2' : 'c4';
    }

    function loadScript(src) {
      return new Promise(function (resolve, reject) {
        var s = document.createElement('script');
        s.src = src;
        s.onload = resolve;
        s.onerror = function () { reject(new Error('Failed to load ' + src)); };
        document.head.appendChild(s);
      });
    }

    var VENDOR = '/demo/vendor-dist';

    // ── L2Dwidget-based avatar (full SDK, no SES eval needed) ──
    var __l2dWidgetEl = null;
    var __l2dWidgetCanvas = null;
    var __l2dObserver = null;

    function waitForEl(selector, timeout) {
      return new Promise(function (resolve, reject) {
        var start = Date.now();
        (function poll() {
          var el = document.querySelector(selector);
          if (el) return resolve(el);
          if (Date.now() - start > timeout) return reject(new Error('waitForEl timeout: ' + selector));
          setTimeout(poll, 80);
        })();
      });
    }

    function resolveRendererMode(state) {
      var q = new URLSearchParams(location.search).get('renderer');
      var queryMode = String(q || '').toLowerCase();
      if (queryMode === 'pixi' || queryMode === 'l2dwidget' || queryMode === 'vector') return queryMode;
      var stateMode = String(((((state || {}).render || {}).rendererMode) || '').toLowerCase());
      if (stateMode === 'pixi' || stateMode === 'l2dwidget' || stateMode === 'vector') return stateMode;
      return 'pixi';
    }

    function clearLive2DRenderers() {
      if (__l2dObserver) {
        try { __l2dObserver.disconnect(); } catch (_) {}
        __l2dObserver = null;
      }
      var widget = document.getElementById('live2d-widget');
      if (widget && widget.parentNode) widget.parentNode.removeChild(widget);
      __l2dWidgetEl = null;
      __l2dWidgetCanvas = null;

      if (__pixiAdapter && typeof __pixiAdapter.destroy === 'function') {
        try { __pixiAdapter.destroy(); } catch (_) {}
      }
      __pixiAdapter = null;
      // Remove full-screen overlay if present.
      var overlay = document.getElementById('pixiLive2DOverlay');
      if (overlay && overlay.parentNode) overlay.parentNode.removeChild(overlay);
      var live2dCanvas = document.getElementById('live2dCanvas');
      if (live2dCanvas) {
        while (live2dCanvas.firstChild) live2dCanvas.removeChild(live2dCanvas.firstChild);
      }

      __live2dRendererKind = '';
      __live2dModel = null;
    }

    async function initPixiAdapterAvatar(modelJsonUrl, state) {
      if (!window.OpenPersonaPixiLive2DAdapter || !window.OpenPersonaPixiLive2DAdapter.create) {
        throw new Error('pixi-adapter-missing');
      }

      // ── Full-screen overlay container ───────────────────────────────────────
      // Use a fixed-position overlay (like AIRI) so the Live2D character fills
      // the entire viewport without being clipped by the layout's avatar-wrap box.
      // This sidesteps the inset:0 / clientWidth mismatch that caused the small
      // rendering when the PIXI canvas was confined inside avatar-wrap.
      var overlay = document.getElementById('pixiLive2DOverlay');
      if (!overlay) {
        overlay = document.createElement('div');
        overlay.id = 'pixiLive2DOverlay';
        document.body.appendChild(overlay);
      }
      overlay.style.cssText = [
        'position:fixed',
        'top:0', 'left:0',
        'width:100vw', 'height:100vh',
        'pointer-events:none',
        'z-index:5',
        'background:transparent',
        'overflow:hidden'
      ].join(';');

      // Also mark the original avatar-wrap so its circle decorations hide.
      var mount = document.getElementById('live2dCanvas');
      var wrap = mount.parentElement;
      wrap.classList.add('has-live2d');

      var vW = window.innerWidth;
      var vH = window.innerHeight;
      var frameMode = String((((state || {}).appearanceIntent || {}).frameMode) || 'noCropContain');
      var dpr = Math.max(1, window.devicePixelRatio || 1);
      __pixiAdapter = await window.OpenPersonaPixiLive2DAdapter.create({
        mountEl: overlay,
        modelJsonUrl: modelJsonUrl,
        vendorBase: VENDOR,
        frameMode: frameMode === 'upperBodyFocus' ? 'upperBodyFocus' : 'noCropContain',
        viewport: { width: vW, height: vH, dpr: dpr }
      });

      __live2dRendererKind = 'pixi';
      __live2dModel = overlay;
      __live2dReady = true;
      __viewerRenderState = { renderer: 'live2d', detail: 'pixi-ready' };
      updateRenderBadge();
    }

    async function initL2DWidgetAvatar(modelJsonUrl) {

      var wrap = document.getElementById('live2dCanvas').parentElement;
      var W = wrap.clientWidth || 360;
      var H = wrap.clientHeight || 360;

      // ── AIRI-inspired portrait canvas approach ──
      // Chitose is a portrait model (~2:3 ratio). Square canvas forces width-fit,
      // making height overflow. Use a portrait canvas so model fits naturally.
      // Canvas CSS = 100% of container; model renders with Math.min(h,w) scale fit.
      var vh      = window.innerHeight;
      var safeTop = 90;                          // below top UI badges
      var availH  = Math.round(vh * 0.90) - safeTop;  // usable height below badges
      // Portrait canvas: width ≈ 1.2×W, height fills available viewport height
      var CANVAS_H = Math.min(Math.round(W * 1.8), availH);
      var CANVAS_W = Math.round(CANVAS_H / 1.5);  // ~2:3 portrait aspect
      CANVAS_W     = Math.min(CANVAS_W, Math.round(W * 1.3));

      try {
        // Load the two-part L2Dwidget bundle (self-contained, no eval)
        if (!window.L2Dwidget) {
          await loadScript(VENDOR + '/L2Dwidget.min.js');
        }

        // Remove any previous widget DOM
        var oldWidget = document.getElementById('live2d-widget');
        if (oldWidget) oldWidget.parentNode.removeChild(oldWidget);

        // Portrait canvas — model will scale to fit width AND height proportionally
        window.L2Dwidget.init({
          pluginRootPath: VENDOR + '/',
          pluginJsPath: VENDOR + '/',
          pluginModelPath: '',
          tagMode: false,
          model: { jsonPath: modelJsonUrl },
          display: {
            position: 'left',
            width:  CANVAS_W,
            height: CANVAS_H,
            hOffset: 0,
            vOffset: 0,
            superSample: 1
          },
