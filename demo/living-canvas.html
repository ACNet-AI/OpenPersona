<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Living Canvas</title>
  <style>
    :root {
      --bg-0: #04040a;
      --bg-1: #0c1124;
      --bg-2: #181f44;
      --bg-3: #2b1e63;
      --text: #ecebff;
      --muted: #8f95bb;
      --active: #9a8dff;
      --inactive: #4e567f;
      --ring: rgba(154, 141, 255, 0.4);
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      font-family: "DM Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(58% 52% at 50% 34%, var(--bg-3) 0%, var(--bg-2) 40%, var(--bg-1) 68%, var(--bg-0) 100%),
        linear-gradient(160deg, #0b1020 0%, #06070f 100%);
      overflow: hidden;
    }

    .canvas {
      position: relative;
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
    }

    .avatar-wrap {
      position: relative;
      width: min(46vw, 360px);
      aspect-ratio: 1;
      border-radius: 999px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: radial-gradient(circle at 36% 28%, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.01) 56%);
      backdrop-filter: blur(6px);
      box-shadow:
        0 0 44px 6px rgba(154, 141, 255, 0.3),
        0 0 140px 24px rgba(118, 91, 255, 0.16);
      /* overflow: hidden removed — live2d avatar stands above the circle */
    }
    /* When live2d is active: circle completely invisible, just a layout anchor */
    .avatar-wrap.has-live2d {
      overflow: visible;
      background: transparent !important;
      border-color: transparent !important;
      backdrop-filter: none !important;
      box-shadow: none !important;
    }
    .avatar-wrap.has-live2d::before,
    .avatar-wrap.has-live2d::after {
      display: none !important;
    }

    .avatar-wrap::before {
      content: "";
      position: absolute;
      inset: -8%;
      border-radius: 999px;
      border: 1px solid var(--ring);
      filter: blur(2px);
    }

    .avatar-wrap::after {
      content: "";
      position: absolute;
      inset: -22%;
      border-radius: 999px;
      background: radial-gradient(circle, rgba(154, 141, 255, 0.2), rgba(154, 141, 255, 0) 70%);
      filter: blur(14px);
      z-index: -1;
    }

    .avatar {
      width: 100%;
      height: 100%;
      border-radius: 999px;
      object-fit: cover;
      display: block;
      background: #131327;
    }

    .avatar-canvas {
      position: absolute;
      inset: 0;
      z-index: 2;
      background: transparent;
    }

    .avatar-media {
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    #live2dCanvas {
      z-index: 3;
      border-radius: 0;
      background: transparent !important;
      width: 100%;
      height: 100%;
    }

    .meta {
      margin-top: 24px;
      text-align: center;
      display: none;
    }

    .name {
      margin: 0;
      font-size: clamp(26px, 3vw, 38px);
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .role {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .sense-rail {
      position: absolute;
      right: 22px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding: 10px 8px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 16px;
      background: rgba(8, 10, 24, 0.5);
      backdrop-filter: blur(8px);
    }

    .sense {
      width: 40px;
      height: 40px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.03);
      display: grid;
      place-items: center;
      color: var(--inactive);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      transition: all 180ms ease;
    }

    .sense.active {
      color: var(--active);
      border-color: rgba(154, 141, 255, 0.68);
      box-shadow: 0 0 16px rgba(154, 141, 255, 0.32);
      background: rgba(154, 141, 255, 0.1);
    }

    .controls {
      position: absolute;
      left: 20px;
      bottom: 20px;
      width: min(300px, calc(100vw - 70px));
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(9, 10, 22, 0.48);
      backdrop-filter: blur(8px);
      border-radius: 12px;
      padding: 10px 12px;
      display: grid;
      gap: 8px;
      font-size: 12px;
      opacity: 0.72;
      transition: opacity 180ms ease;
      z-index: 8;
    }

    .controls.hidden {
      display: none !important;
    }

    .controls:hover {
      opacity: 0.96;
    }

    .controls-row {
      display: grid;
      grid-template-columns: 78px 1fr;
      align-items: center;
      gap: 8px;
    }

    .controls label {
      color: var(--muted);
    }

    .controls select,
    .controls input[type="checkbox"] {
      accent-color: var(--active);
    }

    .controls select {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.18);
      color: var(--text);
      padding: 6px 8px;
      border-radius: 8px;
    }

    .fps {
      display: flex;
      justify-content: space-between;
      color: #f3f2ff;
      font-size: 13px;
      font-weight: 600;
      line-height: 1.4;
      background: rgba(8, 10, 22, 0.65);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      padding: 6px 8px;
    }

    .advanced-block {
      border: 1px solid rgba(255, 255, 255, 0.14);
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.03);
      padding: 6px 8px;
    }

    .advanced-block > summary {
      cursor: pointer;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      user-select: none;
      padding: 2px 0;
      outline: none;
    }

    .advanced-content {
      margin-top: 8px;
      display: grid;
      gap: 8px;
    }

    .status-badge {
      position: absolute;
      left: 20px;
      top: 20px;
      z-index: 9;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.03em;
      background: rgba(8, 10, 22, 0.66);
      border: 1px solid rgba(255, 255, 255, 0.22);
      color: #d8dcff;
      backdrop-filter: blur(8px);
    }

    .status-badge.locked {
      color: #ffffff;
      border-color: rgba(154, 141, 255, 0.8);
      box-shadow: 0 0 14px rgba(154, 141, 255, 0.38);
      background: rgba(44, 33, 108, 0.62);
    }

    .render-badge {
      top: 56px;
      color: #cbd4ff;
      font-weight: 600;
      font-size: 11px;
      opacity: 0.95;
      display: none;
    }

    .render-badge.fallback {
      color: #ffd7d7;
      border-color: rgba(255, 138, 138, 0.8);
      background: rgba(95, 30, 40, 0.62);
    }

    @media (max-width: 900px) {
      .avatar-wrap { width: min(72vw, 320px); }
      .controls { width: min(240px, calc(100vw - 80px)); }
    }
  </style>
</head>

        <iframe class="avatar avatar-media" id="avatarViewer" title="provider avatar viewer" style="display:none; border:0;"></iframe>
        <div class="avatar avatar-media" id="live2dCanvas" style="display:none; background:transparent;" aria-label="live2d avatar canvas"></div>

      <div class="meta">
        <h1 class="name" id="personaName">Persona</h1>

    <aside class="sense-rail" aria-label="sensory capabilities">
      <div class="sense active" id="sense-image" title="image">img</div>
      <div class="sense" id="sense-model3d" title="3d">3d</div>
      <div class="sense active" id="sense-motion" title="motion">mov</div>
      <div class="sense active" id="sense-voice" title="voice">vox</div>
      <div class="sense" id="sense-hearing" title="hearing">ear</div>
      <div class="sense" id="sense-worldSense" title="world">env</div>
    </aside>

    <section class="controls" aria-label="render controls">
      <div class="controls-row">
        <label for="displayMode">Display</label>
        <select id="displayMode">
          <option value="provider" selected>provider</option>
          <option value="experimental">experimental</option>
        </select>
      </div>
      <details class="advanced-block">
        <summary>Advanced</summary>
        <div class="advanced-content">
          <div class="controls-row">
            <label for="renderQuality">Quality</label>
            <select id="renderQuality">
              <option value="low">low</option>
              <option value="medium" selected>medium</option>
              <option value="high">high</option>
            </select>
          </div>
          <div class="controls-row">
            <label for="autoQuality">Auto Quality</label>
            <input id="autoQuality" type="checkbox" checked />
          </div>
          <div class="fps">
            <span id="fpsValue">fps: --</span>
            <span id="perfNote">target: 30</span>
          </div>
        </div>
      </details>
    </section>
  </main>

  <script>
    var __stateUrl = null;
    var __pollTimer = null;
    var __lastStateHash = '';
    var __livekitConnected = false;
    var __renderState = null;
    var __renderer = null;
    var __queryIntentOverride = null;
    var __debugMode = false;
    var __viewerRenderState = null;
    var __viewerWaitTimer = null;
    var __viewerWaitToken = 0;
    var __viewerFallbackByTimeout = false;
    var __viewerLastSrc = '';
    var __viewerLoaded = false;
    var __viewerError = false;
    var __viewerLastHeartbeatAt = 0;

    // ── Direct Live2D renderer (no iframe) ──
    var __live2dModel = null;
    var __live2dModelUrl = '';
    var __live2dLoading = false;
    var __live2dReady = false;
    var __live2dRendererKind = '';
    var __pixiAdapter = null;

    function resolveLive2DRuntime(url) {
      if (!url) return '';
      return /\.model\.json($|\?)/i.test(url) ? 'c2' : 'c4';
    }

    function loadScript(src) {
      return new Promise(function (resolve, reject) {
        var s = document.createElement('script');
        s.src = src;
        s.onload = resolve;
        s.onerror = function () { reject(new Error('Failed to load ' + src)); };
        document.head.appendChild(s);
      });
    }

    var VENDOR = '/demo/vendor-dist';

    // ── L2Dwidget-based avatar (full SDK, no SES eval needed) ──
    var __l2dWidgetEl = null;
    var __l2dWidgetCanvas = null;
    var __l2dObserver = null;

    function waitForEl(selector, timeout) {
      return new Promise(function (resolve, reject) {
        var start = Date.now();
        (function poll() {
          var el = document.querySelector(selector);
          if (el) return resolve(el);
          if (Date.now() - start > timeout) return reject(new Error('waitForEl timeout: ' + selector));
          setTimeout(poll, 80);
        })();
      });
    }

    function resolveRendererMode(state) {
      var q = new URLSearchParams(location.search).get('renderer');
      var queryMode = String(q || '').toLowerCase();
      if (queryMode === 'pixi' || queryMode === 'l2dwidget' || queryMode === 'vector') return queryMode;
      var stateMode = String(((((state || {}).render || {}).rendererMode) || '').toLowerCase());
      if (stateMode === 'pixi' || stateMode === 'l2dwidget' || stateMode === 'vector') return stateMode;
      return 'pixi';
    }

    function clearLive2DRenderers() {
      if (__l2dObserver) {
        try { __l2dObserver.disconnect(); } catch (_) {}
        __l2dObserver = null;
      }
      var widget = document.getElementById('live2d-widget');
      if (widget && widget.parentNode) widget.parentNode.removeChild(widget);
      __l2dWidgetEl = null;
      __l2dWidgetCanvas = null;

      if (__pixiAdapter && typeof __pixiAdapter.destroy === 'function') {
        try { __pixiAdapter.destroy(); } catch (_) {}
      }
      __pixiAdapter = null;
      // Remove full-screen overlay if present.
      var overlay = document.getElementById('pixiLive2DOverlay');
      if (overlay && overlay.parentNode) overlay.parentNode.removeChild(overlay);
      var live2dCanvas = document.getElementById('live2dCanvas');
      if (live2dCanvas) {
        while (live2dCanvas.firstChild) live2dCanvas.removeChild(live2dCanvas.firstChild);
      }

      __live2dRendererKind = '';
      __live2dModel = null;

      if (!state) return;
      if (state.personaName) document.getElementById('personaName').textContent = state.personaName;
      if (state.role) document.getElementById('personaRole').textContent = state.role;
      window.__CANVAS_STATE = state;
      var renderCfg = getRenderConfig(state);
      var displayMode = renderCfg.displayMode;

      var media = getMediaState(state);
      var providerCaps = getProviderCapabilities(state);
      var hasVideo = !!media.avatarVideo;
      var hasViewer = !!media.avatarViewer;
      var hasFaceRig = !!providerCaps.faceRig;
      var useCanvasFaceRig = false;
      var img = document.getElementById('avatarImage');
      var video = document.getElementById('avatarVideo');
      var viewer = document.getElementById('avatarViewer');
      if (media.avatar) img.src = media.avatar;
      if (hasVideo) video.src = media.avatarVideo;
      else video.removeAttribute('src');
      var model3Url = (state && state.avatarModel3Url) || '';
      var hasDirectLive2D = !!model3Url;
      if (!hasDirectLive2D && (__live2dReady || __live2dLoading || __l2dWidgetEl || __pixiAdapter)) {
        clearLive2DRenderers();
        __live2dReady = false;
        __live2dLoading = false;
        __live2dModelUrl = '';
      }

      if (displayMode === 'experimental') {
        clearViewerWaitTimer();
        __viewerRenderState = null;
        updateRenderBadge();
        setCanvasVisibility(true);
        setMediaVisibility(false, false);
        setViewerVisibility(false);
        setLive2DCanvasVisibility(false);
      } else if (hasDirectLive2D) {
        setCanvasVisibility(false);
        setMediaVisibility(false, false);
        setViewerVisibility(false);
        setLive2DCanvasVisibility(true);
        if (!__live2dReady && !__live2dLoading) {
          __viewerRenderState = { renderer: 'live2d', detail: 'loading-model' };
          updateRenderBadge();
          initLive2DRenderer(model3Url, state);
        }
        if (__live2dReady) {
          if (__live2dRendererKind === 'pixi' && __pixiAdapter && typeof __pixiAdapter.setFrameMode === 'function') {
            var fm = String((((state || {}).appearanceIntent || {}).frameMode) || 'noCropContain');
            __pixiAdapter.setFrameMode(fm === 'upperBodyFocus' ? 'upperBodyFocus' : 'noCropContain');
            syncPixiViewportFromWrap();
          }
          applyFaceControlToLive2D(normalizeFaceControl(state));
        }
      } else if (hasViewer) {
        setCanvasVisibility(false);
        setMediaVisibility(false, false);
        setViewerVisibility(true);
        setLive2DCanvasVisibility(false);
        if (!__viewerRenderState) {
          __viewerRenderState = { renderer: 'unknown', detail: 'waiting-viewer' };
        }
        updateRenderBadge();
      } else if (__livekitConnected || hasVideo) {
        clearViewerWaitTimer();
        __viewerRenderState = null;
        updateRenderBadge();
        setCanvasVisibility(false);
        setMediaVisibility(true, false);
        setViewerVisibility(false);
      } else {
        clearViewerWaitTimer();
        __viewerRenderState = null;
        updateRenderBadge();
        setCanvasVisibility(false);
        setViewerVisibility(false);
        setLive2DCanvasVisibility(false);
        if (media.avatar) {
          setMediaVisibility(false, true);
          var _ph = document.getElementById('avatarPlaceholder');
          if (_ph) _ph.style.display = 'none';
        } else {
          setMediaVisibility(false, false);
          var _ph = document.getElementById('avatarPlaceholder');
          if (_ph) _ph.style.display = 'flex';
        }
      }

      var sensory = getSensory(state);
      ['image', 'model3d', 'motion', 'voice', 'hearing', 'worldSense'].forEach(function (key) {
        var el = document.getElementById('sense-' + key);
        if (!el) return;
        el.classList.toggle('active', !!sensory[key]);
      });

      var prevRenderState = __renderState;
      var effectiveQuality = renderCfg.quality;
      // In auto mode, keep locally adapted quality to avoid poll-reset oscillation.
      if (renderCfg.autoQuality && prevRenderState && prevRenderState.autoQuality) {
        effectiveQuality = prevRenderState.quality;
      }
      var nextFaceProfile = normalizeFaceProfile(state);
      var faceProfileChanged = stableHash((__renderState && __renderState.faceProfile) || {}) !== stableHash(nextFaceProfile);
      var qualityChanged = !prevRenderState || prevRenderState.quality !== effectiveQuality;
      __renderState = {
        displayMode: displayMode,
        quality: effectiveQuality,
        autoQuality: renderCfg.autoQuality,
        visualManifest: normalizeVisualManifest(state),
        appearanceIntent: normalizeAppearanceIntent(state),
        faceProfile: nextFaceProfile,
        faceControl: normalizeFaceControl(state),
        useCanvasFaceRig: useCanvasFaceRig
      };
      updateIntentBadge(
        displayMode === 'experimental' ? 'Experimental Face' : 'Provider Mode',
        displayMode === 'experimental'
      );
      updateControlValues();
      if (__renderer) {
        if (faceProfileChanged) {
          __renderer.setFaceProfile(__renderState.faceProfile, { resetBoot: false });
        }
        if (qualityChanged) {
          __renderer.setQuality(__renderState.quality, { resetBoot: false });
        }
      }
    }

    function stateFromQuery() {
      var p = new URLSearchParams(location.search);
      if (![...p.keys()].length) return null;
      return {
        personaName: p.get('name') || undefined,
        role: p.get('role') || undefined,
        avatar: p.get('avatar') || undefined,
        avatarVideo: p.get('video') || undefined,
        render: {
          displayMode: p.get('display') === 'experimental' ? 'experimental' : 'provider',
          quality: p.get('quality') || 'medium',
          autoQuality: parseBool(p.get('autoQuality'), true),
          rendererMode: (function () {
            var r = String(p.get('renderer') || '').toLowerCase();
            if (r === 'pixi' || r === 'l2dwidget' || r === 'vector') return r;
            return undefined;
          })()
        },
        faceProfile: {
          seed: p.get('seed') || '',
          jawWidth: Number(p.get('jawWidth') || 1),
          eyeSpacing: Number(p.get('eyeSpacing') || 1),
          noseLength: Number(p.get('noseLength') || 1),
          mouthWidth: Number(p.get('mouthWidth') || 1),
          browTilt: Number(p.get('browTilt') || 0),
          cheekFullness: Number(p.get('cheekFullness') || 1)
        },
        faceControl: {
          pose: {
            yaw: Number(p.get('yaw') || 0),
            pitch: Number(p.get('pitch') || 0),
            roll: Number(p.get('roll') || 0)
          },
          eyes: {
            blinkL: Number(p.get('blinkL') || 0),
            blinkR: Number(p.get('blinkR') || 0),
            gazeX: Number(p.get('gazeX') || 0),
            gazeY: Number(p.get('gazeY') || 0)
          },
          mouth: {
            jawOpen: Number(p.get('jawOpen') || 0),
            smile: Number(p.get('smile') || 0),
            mouthPucker: Number(p.get('mouthPucker') || 0)
          }
        },
        appearanceIntent: {
          form: normalizeFormName(p.get('form') || 'auto'),
          transition: p.get('transition') || 'smooth',
          lockSeconds: Number(p.get('lockSeconds') || 0),
          updatedAt: p.get('updatedAt') || ''
        },
        sensory: {
          image: parseBool(p.get('image'), true),
          model3d: parseBool(p.get('model3d'), false),
          motion: parseBool(p.get('motion'), true),
          voice: parseBool(p.get('voice'), true),
          hearing: parseBool(p.get('hearing'), false),
          worldSense: parseBool(p.get('worldSense'), false)
        }
      };
    }

    async function pollStateFile() {
      if (!__stateUrl) return;
      try {
        var data = await fetch(__stateUrl + (__stateUrl.indexOf('?') === -1 ? '?' : '&') + '_t=' + Date.now()).then(function (r) { return r.json(); });
        data = applyQueryIntentOverride(data);
        var nextHash = stableHash(data);
        if (nextHash === __lastStateHash) return;
        __lastStateHash = nextHash;
        applyState(data);
        await tryConnectLiveKit();
      } catch (_) {}
    }

    function startPolling() {
      if (!__stateUrl || __pollTimer) return;
      __pollTimer = setInterval(pollStateFile, 2000);
    }

    async function tryConnectLiveKit() {
      var state = window.__CANVAS_STATE || {};
      var lk = state.livekit || {};
      if (!lk.url || !lk.token) return;
      if (!window.livekit || !window.livekit.Room) return;
      if (__livekitConnected) return;
      var img = document.getElementById('avatarImage');
      var video = document.getElementById('avatarVideo');
      var room = new window.livekit.Room();

      room.on(window.livekit.RoomEvent.TrackSubscribed, function (track) {
        if (track.kind !== 'video') return;
        try {
          var element = track.attach();
          element.autoplay = true;
          element.muted = true;
          element.playsInline = true;
          element.className = video.className;
          element.id = video.id;
          video.replaceWith(element);
          img.style.display = 'none';
          element.style.display = 'block';
          setCanvasVisibility(false);
        } catch (_) {}
      });

      try {
        await room.connect(lk.url, lk.token);
        __livekitConnected = true;
      } catch (_) {}
    }

    async function init() {
      attachControlEvents();
      applyDebugModeGate();
      var viewerEl = document.getElementById('avatarViewer');
      if (viewerEl) {
        viewerEl.addEventListener('load', function () {
          __viewerLoaded = true;
          __viewerError = false;
          clearViewerWaitTimer();
          if (__viewerRenderState && (
            __viewerRenderState.detail === 'waiting-viewer' ||
            __viewerRenderState.detail === 'initializing'
          )) {
            __viewerRenderState = {
              renderer: 'live2d',
              detail: 'viewer-loaded-awaiting-renderer'
            };
            updateRenderBadge();
          }
          setTimeout(function () {
            if (!__viewerLoaded) return;
            var stale = !__viewerLastHeartbeatAt || (Date.now() - __viewerLastHeartbeatAt > 2000);
            if (stale && __viewerRenderState && __viewerRenderState.detail === 'viewer-loaded-awaiting-renderer') {
              __viewerRenderState = {
                renderer: 'vector-fallback',
                detail: 'viewer-no-heartbeat'
              };
              updateRenderBadge();
            }
          }, 2200);
        });
        viewerEl.addEventListener('error', function () {
          __viewerError = true;
          __viewerLoaded = false;
          clearViewerWaitTimer();
          __viewerRenderState = { renderer: 'vector-fallback', detail: 'viewer-load-error' };
          updateRenderBadge();
          if (__renderState) __renderState.useCanvasFaceRig = true;
          setViewerVisibility(false);
          setMediaVisibility(false, false);
          setCanvasVisibility(true);
        });
      }
      window.addEventListener('message', function (ev) {
        var data = ev && ev.data ? ev.data : null;
        if (!data || data.source !== 'live2d-cubism-web-bridge' || data.type !== 'renderer-state') return;
        clearViewerWaitTimer();
        __viewerLastHeartbeatAt = Date.now();
        __viewerLoaded = true;
        __viewerError = false;
        if (data.detail && data.detail !== 'waiting-viewer') {
          __viewerFallbackByTimeout = false;
        }
        __viewerRenderState = {
          renderer: data.renderer || 'unknown',
          detail: data.detail || '',
          model3Url: data.model3Url || ''
        };
        updateRenderBadge();
      });
      __queryIntentOverride = parseQueryIntentOverride();
      __renderer = new CanvasAvatarRenderer(document.getElementById('avatarCanvas'), function () {
        return __renderState || {
          displayMode: 'provider',
          quality: 'medium',
          autoQuality: true,
          visualManifest: DEFAULT_VISUAL_MANIFEST,
          faceProfile: normalizeFaceProfile({ personaName: 'Persona' }),
          faceControl: normalizeFaceControl({}),
          appearanceIntent: {
            version: '0.1',
            form: 'auto',
            transition: 'smooth',
            lockSeconds: 0,
            updatedAt: ''
          }
        };
      });

      if (window.CANVAS_STATE) {
        applyState(window.CANVAS_STATE);
        await tryConnectLiveKit();
        return;
      }

      var p = new URLSearchParams(location.search);
      var stateUrl = p.get('state');
      if (stateUrl) {
        __stateUrl = stateUrl;
        try {
          var data = await fetch(stateUrl).then(function (r) { return r.json(); });
          data = applyQueryIntentOverride(data);
          __lastStateHash = stableHash(data);
          applyState(data);
          await tryConnectLiveKit();
          startPolling();
          return;
        } catch (_) {}
      }

      applyState(stateFromQuery());
      await tryConnectLiveKit();
    }

    init();
  </script>
</body>
</html>
